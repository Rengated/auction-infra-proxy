# Зарубежный прокси-сервер для Hermes Trade:
#   telemt  — MTProto-прокси (fake-TLS, спонсорский канал) — активный Rust-форк
#   3proxy  — SOCKS5 для бота (исходящие запросы API к api.telegram.org)
#
#   make install   (генерирует секреты + поднимает оба сервиса)
name: proxy

services:
  # ── MTProto-прокси (telemt) ───────────────────────────────────────────────
  telemt:
    image: whn0thacked/telemt-docker:latest
    restart: unless-stopped
    environment:
      RUST_LOG: "info"
    command: ["/etc/telemt/telemt.toml"]
    volumes:
      - ./telemt-config:/etc/telemt
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=32m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ── SOCKS5 для бота (3proxy) ──────────────────────────────────────────────
  socks:
    image: 3proxy/3proxy:latest
    restart: unless-stopped
    volumes:
      - ./3proxy.cfg:/etc/3proxy/3proxy.cfg:ro
    ports:
      - "${SOCKS_PORT:-1080}:1080"
