# Зарубежный прокси-сервер для Hermes Trade:
#   telemt  — MTProto-прокси (fake-TLS, спонсорский канал) — активный Rust-форк
#   socks   — 3proxy: HTTP-CONNECT + SOCKS5 на localhost (наружу через stunnel)
#   stunnel — TLS-обёртка для прокси бота (anti-DDoS хостера пропускает как HTTPS)
#
#   make install   (генерирует секреты + поднимает сервисы)
name: proxy

services:
  # ── MTProto-прокси (telemt) ───────────────────────────────────────────────
  telemt:
    image: whn0thacked/telemt-docker:latest
    restart: unless-stopped
    environment:
      RUST_LOG: "info"
    command: ["/etc/telemt/telemt.toml"]
    volumes:
      - ./telemt-config:/etc/telemt
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=32m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ── Прокси для бота: 3proxy на localhost (HTTP-CONNECT :3129, SOCKS5 :1080) ─
  socks:
    image: 3proxy/3proxy:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./3proxy.cfg:/etc/3proxy/3proxy.cfg:ro

  # ── TLS-обёртка: снаружи HTTPS, внутрь → 3proxy HTTP-CONNECT ───────────────
  stunnel:
    build:
      context: .
      dockerfile: stunnel.Dockerfile
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./stunnel-config:/etc/stunnel
    depends_on:
      - socks
